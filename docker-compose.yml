version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cwflgma-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cwflgma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: cwflgma-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cwflgma
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cwflgma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：MongoDB 管理界面
  mongo-express:
    image: mongo-express:latest
    container_name: cwflgma-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy

  # 可选：PostgreSQL 管理界面
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cwflgma-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cwflgma.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
