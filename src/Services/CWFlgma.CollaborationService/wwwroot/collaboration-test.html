<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CWFlgma 实时协作测试</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .section { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .section h3 { margin-top: 0; color: #333; }
        input, button, select, textarea { padding: 8px; margin: 5px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; border-radius: 3px; }
        button:hover { background: #0056b3; }
        button.success { background: #28a745; }
        button.success:hover { background: #218838; }
        button.warning { background: #ffc107; color: #333; }
        button.warning:hover { background: #e0a800; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #c82333; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #log { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; background: #f5f5f5; font-family: monospace; font-size: 12px; }
        .log-entry { margin: 3px 0; padding: 3px; border-bottom: 1px solid #eee; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
        #status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; }
        .disconnected { background: #f8d7da; }
        .user-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        .user-card { background: #e9ecef; padding: 10px; border-radius: 5px; min-width: 150px; }
        .user-card.current { border: 2px solid #007bff; }
        .canvas-container { position: relative; border: 2px solid #333; background: #fff; width: 800px; height: 500px; overflow: hidden; }
        .cursor { position: absolute; width: 20px; height: 20px; pointer-events: none; }
        .cursor::before { content: ''; position: absolute; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 16px solid currentColor; transform: rotate(-45deg); }
        .cursor-label { position: absolute; top: 18px; left: 10px; background: currentColor; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; white-space: nowrap; }
        .shape { position: absolute; border: 2px solid #333; background: rgba(0,123,255,0.3); cursor: move; }
        .shape.selected { border-color: #dc3545; border-width: 3px; }
        .shape.locked { background: rgba(255,193,7,0.5); }
        #operations { max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>CWFlgma 实时协作测试</h1>
    
    <div id="status" class="disconnected">未连接</div>
    
    <!-- 配置 -->
    <div class="section">
        <h3>0. 配置</h3>
        <input type="text" id="apiPort" placeholder="CollaborationService HTTPS 端口" value="7165">
        <input type="text" id="userApiPort" placeholder="UserService HTTPS 端口" value="7108">
        <button onclick="updateConfig()">更新配置</button>
        <p>当前 Hub: <span id="currentHub">-</span></p>
    </div>
    
    <!-- 登录 -->
    <div class="section">
        <h3>1. 用户登录</h3>
        <input type="email" id="loginEmail" placeholder="邮箱" value="admin@cwflgma.com">
        <input type="password" id="loginPassword" placeholder="密码" value="Admin@123456">
        <button onclick="login()" id="loginBtn">登录</button>
        <button onclick="quickLoginDemo()" class="warning">快速登录 Demo 用户</button>
        <span id="loginResult"></span>
    </div>
    
    <!-- 文档协作 -->
    <div class="section">
        <h3>2. 文档协作</h3>
        <input type="text" id="documentId" placeholder="文档ID" value="691922341136674816">
        <button onclick="joinDocument()" id="joinBtn" class="success" disabled>加入文档</button>
        <button onclick="leaveDocument()" id="leaveBtn" class="danger" disabled>离开文档</button>
        <button onclick="getOnlineUsers()" id="getUsersBtn" disabled>获取在线用户</button>
    </div>
    
    <!-- 在线用户 -->
    <div class="section">
        <h3>3. 在线用户</h3>
        <div id="onlineUsers" class="user-list">暂无在线用户</div>
    </div>
    
    <!-- 画布区域 -->
    <div class="section">
        <h3>4. 协作画布</h3>
        <p>在画布上移动鼠标同步光标，点击添加图形，右键删除图形</p>
        <div class="canvas-container" id="canvas">
            <!-- 光标和图形会动态添加 -->
        </div>
        <div>
            <button onclick="addShape()" class="success">添加矩形</button>
            <button onclick="clearShapes()" class="danger">清空本地图形</button>
            <button onclick="requestLock()" id="lockBtn" disabled>锁定选中图形</button>
            <button onclick="releaseLock()" id="unlockBtn" disabled>解锁选中图形</button>
        </div>
    </div>
    
    <!-- 操作记录 -->
    <div class="section">
        <h3>5. 操作记录</h3>
        <button onclick="getHistory()">获取历史操作</button>
        <button onclick="clearOperations()">清空显示</button>
        <div id="operations">暂无操作记录</div>
    </div>
    
    <!-- 日志 -->
    <div class="section">
        <h3>操作日志</h3>
        <button onclick="clearLog()">清空日志</button>
        <div id="log"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        let connection = null;
        let token = null;
        let currentUser = null;
        let HUB_URL = 'https://localhost:7215/hubs/collaboration';
        let AUTH_API = 'https://localhost:7108';
        let isInDocument = false;
        let currentDocumentId = null;
        let selectedShapeId = null;
        let shapes = {};
        let cursors = {};
        let shapeCounter = 0;
        
        const colors = ['#007bff', '#28a745', '#dc3545', '#ffc107', '#17a2b8', '#6f42c1'];
        
        function updateConfig() {
            const port = document.getElementById('apiPort').value;
            const userPort = document.getElementById('userApiPort').value;
            
            if (port) HUB_URL = `https://localhost:${port}/hubs/collaboration`;
            if (userPort) AUTH_API = `https://localhost:${userPort}`;
            
            document.getElementById('currentHub').textContent = HUB_URL;
            addLog(`配置已更新: Hub=${HUB_URL}, Auth=${AUTH_API}`, 'info');
        }
        
        function addLog(msg, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong> - ${msg}`;
            log.insertBefore(entry, log.firstChild);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        function updateStatus(connected) {
            const status = document.getElementById('status');
            if (connected) {
                status.className = 'connected';
                status.textContent = `已连接: ${currentUser?.username || 'Unknown'}`;
            } else {
                status.className = 'disconnected';
                status.textContent = '未连接';
            }
            
            document.getElementById('joinBtn').disabled = !connected || isInDocument;
            document.getElementById('leaveBtn').disabled = !isInDocument;
            document.getElementById('getUsersBtn').disabled = !isInDocument;
        }
        
        // 登录
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${AUTH_API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                
                if (result.success) {
                    token = result.accessToken;
                    currentUser = result.user;
                    document.getElementById('loginResult').textContent = `✓ ${currentUser.username}`;
                    addLog(`登录成功: ${currentUser.username}`, 'success');
                    
                    // 连接 SignalR
                    await connectToHub();
                } else {
                    addLog(`登录失败: ${result.errorMessage}`, 'error');
                }
            } catch (error) {
                addLog(`登录失败: ${error.message}`, 'error');
            }
        }
        
        async function quickLoginDemo() {
            document.getElementById('loginEmail').value = 'demo@cwflgma.com';
            document.getElementById('loginPassword').value = 'Demo@123456';
            await login();
        }
        
        // 连接 SignalR
        async function connectToHub() {
            if (connection) {
                await connection.stop();
            }
            
            connection = new signalR.HubConnectionBuilder()
                .withUrl(HUB_URL, { accessTokenFactory: () => token })
                .withAutomaticReconnect()
                .configureLogging(signalR.LogLevel.Information)
                .build();
            
            // 注册事件处理
            connection.on('UserJoined', (user) => {
                addLog(`用户加入: ${user.username} (${user.userId})`, 'success');
                updateOnlineUsers();
            });
            
            connection.on('UserLeft', (sessionId, userId, unlockedLayers) => {
                addLog(`用户离开: Session=${sessionId}, UserId=${userId}`, 'warning');
                removeCursor(sessionId);
                updateOnlineUsers();
            });
            
            connection.on('DocumentState', (state) => {
                addLog(`文档状态: ${state.users.length} 个用户在线`, 'info');
                state.users.forEach(u => {
                    if (u.sessionId !== connection.connectionId) {
                        updateCursor(u.sessionId, u.userId, u.cursor?.x || 0, u.cursor?.y || 0);
                    }
                });
                updateOnlineUsersDisplay(state.users);
            });
            
            connection.on('CursorUpdated', (sessionId, userId, x, y) => {
                if (sessionId !== connection.connectionId) {
                    updateCursor(sessionId, userId, x, y);
                }
            });
            
            connection.on('SelectionUpdated', (sessionId, userId, layerIds, pageId) => {
                addLog(`用户 ${userId} 选中: ${layerIds.join(', ')}`, 'info');
            });
            
            connection.on('OperationReceived', (operation) => {
                addLog(`收到操作: ${operation.type} on ${operation.layerId}`, 'info');
                addOperationToDisplay(operation);
            });
            
            connection.on('LayerLocked', (layerId, sessionId, userId) => {
                addLog(`图层锁定: ${layerId} by User ${userId}`, 'warning');
                if (shapes[layerId]) {
                    shapes[layerId].element.classList.add('locked');
                }
            });
            
            connection.on('LayerUnlocked', (layerId) => {
                addLog(`图层解锁: ${layerId}`, 'info');
                if (shapes[layerId]) {
                    shapes[layerId].element.classList.remove('locked');
                }
            });
            
            connection.on('OperationHistory', (history) => {
                displayHistory(history);
            });
            
            connection.on('Error', (message) => {
                addLog(`错误: ${message}`, 'error');
            });
            
            connection.onreconnecting(() => {
                addLog('正在重新连接...', 'warning');
                updateStatus(false);
            });
            
            connection.onreconnected(() => {
                addLog('重新连接成功', 'success');
                if (isInDocument) {
                    joinDocument();
                }
                updateStatus(true);
            });
            
            connection.onclose(() => {
                addLog('连接已关闭', 'error');
                updateStatus(false);
            });
            
            try {
                await connection.start();
                addLog('SignalR 连接成功', 'success');
                updateStatus(true);
            } catch (error) {
                addLog(`连接失败: ${error.message}`, 'error');
            }
        }
        
        // 加入文档
        async function joinDocument() {
            const documentId = document.getElementById('documentId').value;
            if (!documentId || !connection) return;
            
            try {
                await connection.invoke('JoinDocument', documentId, 
                    currentUser.id, currentUser.username, 
                    currentUser.displayName, currentUser.avatarUrl);
                
                isInDocument = true;
                currentDocumentId = documentId;
                addLog(`已加入文档: ${documentId}`, 'success');
                updateStatus(true);
            } catch (error) {
                addLog(`加入文档失败: ${error.message}`, 'error');
            }
        }
        
        // 离开文档
        async function leaveDocument() {
            if (!connection || !isInDocument) return;
            
            try {
                await connection.invoke('LeaveDocument', currentDocumentId);
                isInDocument = false;
                currentDocumentId = null;
                clearCursors();
                addLog('已离开文档', 'info');
                updateStatus(true);
            } catch (error) {
                addLog(`离开文档失败: ${error.message}`, 'error');
            }
        }
        
        // 获取在线用户
        async function getOnlineUsers() {
            if (!currentDocumentId) return;
            
            try {
                const response = await fetch(`${AUTH_API.replace('7108', '7215')}/api/collaboration/${currentDocumentId}/users`);
                const users = await response.json();
                updateOnlineUsersDisplay(users);
                addLog(`获取到 ${users.length} 个在线用户`, 'info');
            } catch (error) {
                addLog(`获取在线用户失败: ${error.message}`, 'error');
            }
        }
        
        // 更新在线用户显示
        function updateOnlineUsersDisplay(users) {
            const container = document.getElementById('onlineUsers');
            if (!users || users.length === 0) {
                container.innerHTML = '暂无在线用户';
                return;
            }
            
            container.innerHTML = users.map(u => `
                <div class="user-card ${u.sessionId === connection?.connectionId ? 'current' : ''}">
                    <strong>${u.username}</strong><br>
                    <small>ID: ${u.userId}</small><br>
                    <small>Session: ${u.sessionId?.substring(0, 8)}...</small>
                </div>
            `).join('');
        }
        
        async function updateOnlineUsers() {
            if (currentDocumentId) {
                await getOnlineUsers();
            }
        }
        
        // 光标管理
        function updateCursor(sessionId, userId, x, y) {
            const canvas = document.getElementById('canvas');
            let cursor = cursors[sessionId];
            
            if (!cursor) {
                cursor = document.createElement('div');
                cursor.className = 'cursor';
                cursor.style.color = colors[Object.keys(cursors).length % colors.length];
                cursor.innerHTML = `<div class="cursor-label">User ${userId}</div>`;
                canvas.appendChild(cursor);
                cursors[sessionId] = cursor;
            }
            
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
        }
        
        function removeCursor(sessionId) {
            if (cursors[sessionId]) {
                cursors[sessionId].remove();
                delete cursors[sessionId];
            }
        }
        
        function clearCursors() {
            Object.keys(cursors).forEach(removeCursor);
        }
        
        // 画布事件
        const canvas = document.getElementById('canvas');
        
        canvas.addEventListener('mousemove', async (e) => {
            if (!connection || !isInDocument) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            try {
                await connection.invoke('UpdateCursor', currentDocumentId, x, y);
            } catch (error) {
                // 静默处理，避免频繁日志
            }
        });
        
        canvas.addEventListener('click', (e) => {
            if (e.target === canvas) {
                // 点击空白区域，取消选中
                if (selectedShapeId && shapes[selectedShapeId]) {
                    shapes[selectedShapeId].element.classList.remove('selected');
                    selectedShapeId = null;
                }
            }
        });
        
        // 图形管理
        function addShape() {
            if (!connection || !isInDocument) {
                addLog('请先加入文档', 'warning');
                return;
            }
            
            const shapeId = `shape_${++shapeCounter}`;
            const x = Math.random() * 700;
            const y = Math.random() * 400;
            const width = 50 + Math.random() * 100;
            const height = 50 + Math.random() * 100;
            
            createShapeElement(shapeId, x, y, width, height);
            
            // 发送操作
            sendOperation('add', shapeId, { x, y, width, height });
        }
        
        function createShapeElement(shapeId, x, y, width, height) {
            const canvas = document.getElementById('canvas');
            const shape = document.createElement('div');
            shape.className = 'shape';
            shape.id = shapeId;
            shape.style.left = x + 'px';
            shape.style.top = y + 'px';
            shape.style.width = width + 'px';
            shape.style.height = height + 'px';
            
            shape.addEventListener('click', (e) => {
                e.stopPropagation();
                selectShape(shapeId);
            });
            
            shape.addEventListener('contextmenu', async (e) => {
                e.preventDefault();
                await deleteShape(shapeId);
            });
            
            // 拖拽支持
            let isDragging = false;
            let startX, startY, origX, origY;
            
            shape.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                origX = parseInt(shape.style.left);
                origY = parseInt(shape.style.top);
                selectShape(shapeId);
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                shape.style.left = (origX + dx) + 'px';
                shape.style.top = (origY + dy) + 'px';
            });
            
            document.addEventListener('mouseup', async (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const newX = parseInt(shape.style.left);
                const newY = parseInt(shape.style.top);
                
                await sendOperation('move', shapeId, { x: newX, y: newY }, { x: origX, y: origY });
            });
            
            canvas.appendChild(shape);
            shapes[shapeId] = { element: shape, x, y, width, height };
        }
        
        function selectShape(shapeId) {
            if (selectedShapeId && shapes[selectedShapeId]) {
                shapes[selectedShapeId].element.classList.remove('selected');
            }
            
            selectedShapeId = shapeId;
            if (shapes[shapeId]) {
                shapes[shapeId].element.classList.add('selected');
            }
            
            document.getElementById('lockBtn').disabled = false;
            document.getElementById('unlockBtn').disabled = false;
            
            // 发送选中状态
            if (connection && isInDocument) {
                connection.invoke('UpdateSelection', currentDocumentId, [shapeId], null);
            }
        }
        
        async function deleteShape(shapeId) {
            if (!shapes[shapeId]) return;
            
            shapes[shapeId].element.remove();
            delete shapes[shapeId];
            
            await sendOperation('delete', shapeId, null, null);
            addLog(`删除图形: ${shapeId}`, 'info');
        }
        
        function clearShapes() {
            Object.keys(shapes).forEach(id => {
                shapes[id].element.remove();
            });
            shapes = {};
            addLog('已清空本地图形', 'info');
        }
        
        // 操作同步
        async function sendOperation(type, layerId, changes, previousValues) {
            if (!connection || !isInDocument) return;
            
            const operation = {
                type,
                layerId,
                changes,
                previousValues,
                sequenceNumber: 0,
                sessionId: ''
            };
            
            try {
                await connection.invoke('SendOperation', currentDocumentId, operation);
            } catch (error) {
                addLog(`发送操作失败: ${error.message}`, 'error');
            }
        }
        
        function addOperationToDisplay(operation) {
            const container = document.getElementById('operations');
            const entry = document.createElement('div');
            entry.style.borderBottom = '1px solid #ddd';
            entry.style.padding = '5px';
            entry.innerHTML = `
                <strong>${operation.type}</strong> on ${operation.layerId || 'N/A'}
                <br><small>Seq: ${operation.sequenceNumber}</small>
            `;
            container.insertBefore(entry, container.firstChild);
        }
        
        function clearOperations() {
            document.getElementById('operations').innerHTML = '暂无操作记录';
        }
        
        // 锁定管理
        async function requestLock() {
            if (!selectedShapeId || !connection || !isInDocument) return;
            
            try {
                const result = await connection.invoke('RequestLock', currentDocumentId, selectedShapeId);
                if (result) {
                    addLog(`锁定成功: ${selectedShapeId}`, 'success');
                } else {
                    addLog(`锁定失败: ${selectedShapeId} 已被锁定`, 'warning');
                }
            } catch (error) {
                addLog(`锁定失败: ${error.message}`, 'error');
            }
        }
        
        async function releaseLock() {
            if (!selectedShapeId || !connection || !isInDocument) return;
            
            try {
                await connection.invoke('ReleaseLock', currentDocumentId, selectedShapeId);
                addLog(`解锁: ${selectedShapeId}`, 'success');
            } catch (error) {
                addLog(`解锁失败: ${error.message}`, 'error');
            }
        }
        
        // 历史记录
        async function getHistory() {
            if (!connection || !isInDocument) return;
            
            try {
                await connection.invoke('GetOperationHistory', currentDocumentId, 0, 50);
            } catch (error) {
                addLog(`获取历史失败: ${error.message}`, 'error');
            }
        }
        
        function displayHistory(history) {
            const container = document.getElementById('operations');
            if (!history || history.length === 0) {
                container.innerHTML = '暂无操作记录';
                return;
            }
            
            container.innerHTML = history.map(h => `
                <div style="border-bottom: 1px solid #ddd; padding: 5px;">
                    <strong>${h.operation.type}</strong> on ${h.operation.layerId || 'N/A'}
                    <br><small>User: ${h.userId} | Seq: ${h.sequenceNumber} | Time: ${new Date(h.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
            
            addLog(`获取到 ${history.length} 条历史记录`, 'info');
        }
        
        // 初始化
        updateConfig();
    </script>
</body>
</html>
