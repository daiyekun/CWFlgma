<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CWFlgma 协作测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        #log { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: #f5f5f5; }
        .entry { margin: 5px 0; padding: 5px; border-bottom: 1px solid #ddd; }
        #status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; }
        .disconnected { background: #f8d7da; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CWFlgma 协作测试</h1>
        <div id="status" class="disconnected">未连接</div>
        
        <div>
            <input type="text" id="username" placeholder="输入用户名" value="User1">
            <button onclick="connect()">连接加入</button>
            <button onclick="disconnect()">断开</button>
            <button onclick="sendOperation()">发送操作</button>
            <button onclick="getHistory()">获取历史</button>
        </div>
        
        <h3>日志</h3>
        <div id="log"></div>
    </div>
    
    <script>
        let connection = null;
        let userId = Math.floor(Math.random() * 100000);
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');
        
        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = '<strong>' + new Date().toLocaleTimeString() + '</strong> - ' + msg;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        async function connect() {
            const username = document.getElementById('username').value || 'User1';
            
            connection = new signalR.HubConnectionBuilder()
                .withUrl("/hubs/collaboration")
                .withAutomaticReconnect()
                .build();
            
            // 监听事件
            connection.on("DocumentState", (state) => {
                addLog("已加入文档，当前 " + state.users.length + " 人在线");
                addLog("锁定的图层: " + JSON.stringify(state.lockedLayers));
            });
            
            connection.on("UserJoined", (user) => {
                addLog("【" + user.username + "】加入了文档");
            });
            
            connection.on("UserLeft", (sessionId, userId, unlockedLayers) => {
                addLog("用户 " + userId + " 离开了文档");
            });
            
            connection.on("CursorUpdated", (sessionId, userId, x, y) => {
                addLog("用户 " + userId + " 光标: (" + Math.round(x) + ", " + Math.round(y) + ")");
            });
            
            connection.on("SelectionUpdated", (sessionId, userId, layerIds) => {
                addLog("用户 " + userId + " 选中: " + layerIds.join(', '));
            });
            
            connection.on("OperationReceived", (op) => {
                addLog("收到操作: " + op.type + " on " + op.layerId);
            });
            
            connection.on("OperationHistory", (history) => {
                addLog("收到 " + history.length + " 条历史记录");
                history.forEach(h => {
                    addLog("  - " + h.timestamp + ": " + h.operation.type + " on " + h.operation.layerId);
                });
            });
            
            connection.on("DesignSaved", (docId, version) => {
                addLog("设计数据已保存，版本: " + version);
            });
            
            connection.on("DesignData", (design) => {
                addLog("收到设计数据: " + (design ? JSON.stringify(design).substring(0, 100) + "..." : "null"));
            });
            
            connection.on("LayerLocked", (layerId, sessionId, userId) => {
                addLog("图层 " + layerId + " 被用户 " + userId + " 锁定");
            });
            
            connection.on("LayerUnlocked", (layerId) => {
                addLog("图层 " + layerId + " 已解锁");
            });
            
            try {
                await connection.start();
                addLog("连接成功！");
                statusDiv.className = 'connected';
                statusDiv.textContent = '已连接 (用户ID: ' + userId + ')';
                
                await connection.invoke("JoinDocument", "doc-1", userId, username, username, null);
                
            } catch (err) {
                addLog("错误: " + err.message);
            }
        }
        
        async function disconnect() {
            if (connection) {
                await connection.invoke("LeaveDocument", "doc-1");
                await connection.stop();
                statusDiv.className = 'disconnected';
                addLog("已断开");
            }
        }
        
        async function sendOperation() {
            if (connection?.state === signalR.HubConnectionState.Connected) {
                const operation = {
                    type: "update_layer",
                    layerId: "layer-" + Math.floor(Math.random() * 10),
                    changes: { "transform.x": Math.random() * 500, "transform.y": Math.random() * 500 }
                };
                await connection.invoke("SendOperation", "doc-1", operation);
                addLog("发送操作: " + operation.type + " on " + operation.layerId);
            }
        }
        
        async function getHistory() {
            if (connection?.state === signalR.HubConnectionState.Connected) {
                await connection.invoke("GetOperationHistory", "doc-1", 0, 10);
                addLog("请求操作历史...");
            }
        }
    </script>
</body>
</html>
